# fly.toml app configuration file generated for zomats-4qcnpg on 2026-05-23T17:19:28Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'zomats-4qcnpg'
primary_region = 'ams'

[build]

[env]
  BOT_MODE = 'webhook'
  DEBUG = 'false'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 100

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
