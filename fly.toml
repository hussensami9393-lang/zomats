# fly.toml - NexusAI Telegram Bot
# عدّل app = "اسم-تطبيقك" ليكون فريداً

app = "nexusai-bot"
primary_region = "ams"  # أمستردام - الأقرب للشرق الأوسط

[build]
  # نستخدم Dockerfile

[env]
  PORT = "8080"
  BOT_MODE = "webhook"
  DEBUG = "false"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 100

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
